# Uncomment these two line to add support for encoders to your firmware
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Kyria OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_KEYBOARD_NAME="Pocketboard"
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_SMP=y
CONFIG_BT_PRIVACY=y
CONFIG_BT_PERIPHERAL=y

CONFIG_ZMK_MAX17048=y
CONFIG_ZMK_BATTERY=y
CONFIG_SENSOR=y
CONFIG_I2C=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Make logs go to USB (CDC ACM)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_CONSOLE=y

# (Optional) make log level more verbose
CONFIG_LOG_DEFAULT_LEVEL=4